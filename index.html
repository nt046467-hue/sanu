<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>With All Love — Nabin 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Pinyon+Script&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0006;
  --tulip:#e8405a;
  --gold:#f0c97a;
  --cream:#fff5f7;
  --green:#2e6b38;
  --green2:#4a9e5c;
}
html,body{min-height:100%;overflow-x:hidden;}
body{
  background:radial-gradient(ellipse at 50% 0%,#1e0014 0%,#0a0006 70%);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:18px 14px 40px;
  font-family:'Raleway',sans-serif;
}

/* falling petals */
.fpetal{
  position:fixed;top:-40px;pointer-events:none;z-index:0;
  opacity:0;animation:fall linear infinite;
  filter:drop-shadow(0 2px 5px rgba(232,64,90,0.5));
}
@keyframes fall{
  0%  {opacity:0;transform:translateY(0) rotate(0deg);}
  6%  {opacity:.85;}
  92% {opacity:.5;}
  100%{opacity:0;transform:translateY(108vh) rotate(380deg);}
}

/* CARD */
.card{
  position:relative;z-index:2;
  width:100%;max-width:390px;
  background:linear-gradient(165deg,#1e0016 0%,#110008 55%,#1c000f 100%);
  border-radius:24px;
  overflow:hidden;
  box-shadow:
    0 0 0 1.5px rgba(240,201,122,0.24),
    0 0 0 5px rgba(232,64,90,0.06),
    0 28px 90px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
.card-inner-border{
  position:absolute;inset:9px;border-radius:17px;
  border:1px solid rgba(240,201,122,0.1);
  pointer-events:none;z-index:10;
}
.co{position:absolute;font-size:1.1rem;color:var(--gold);opacity:.5;z-index:11;pointer-events:none;line-height:1;}
.co-tl{top:14px;left:18px;} .co-tr{top:14px;right:18px;}
.co-bl{bottom:14px;left:18px;} .co-br{bottom:14px;right:18px;}

/* TULIP BANNER */
.tulip-banner{
  width:100%;height:200px;
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0a0006 0%,#140008 100%);
  border-bottom:1px solid rgba(240,201,122,0.1);
}
.tulip-banner svg{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;height:100%;
}

/* HEADER */
.header{text-align:center;padding:18px 22px 6px;position:relative;z-index:1;}
.hrt{
  display:block;font-size:1.7rem;
  animation:hb 1.4s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(232,64,90,0.7));
  margin-bottom:5px;
}
@keyframes hb{
  0%,100%{transform:scale(1);}14%{transform:scale(1.3);}
  28%{transform:scale(1);}42%{transform:scale(1.18);}56%{transform:scale(1);}
}
.t-main{
  font-family:'Pinyon Script',cursive;
  font-size:2.4rem;color:var(--gold);
  text-shadow:0 0 32px rgba(240,201,122,0.55);line-height:1;
}
.t-sub{font-size:.6rem;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,120,155,0.65);margin-top:5px;}

/* DIVIDER */
.dvd{display:flex;align-items:center;gap:8px;margin:12px 22px;opacity:.4;}
.dvd::before,.dvd::after{content:'';flex:1;height:1px;}
.dvd::before{background:linear-gradient(to right,transparent,var(--gold));}
.dvd::after{background:linear-gradient(to left,transparent,var(--gold));}
.dvd span{color:var(--gold);font-size:.85rem;}

/* LYRIC STAGE */
.stage{
  margin:0 16px 14px;min-height:115px;
  background:rgba(0,0,0,0.32);border-radius:16px;
  border:1px solid rgba(232,64,90,0.14);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:18px 14px;position:relative;overflow:hidden;
}
.stage::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 110%,rgba(232,64,90,0.12) 0%,transparent 65%);
  pointer-events:none;
}
.l-hindi{
  font-size:.74rem;color:rgba(255,180,200,0.45);
  font-style:italic;margin-bottom:9px;
  letter-spacing:.5px;text-align:center;min-height:15px;transition:opacity .35s;
}
.l-eng{
  font-family:'Dancing Script',cursive;font-size:1.4rem;font-weight:600;
  color:var(--cream);text-align:center;line-height:1.45;min-height:42px;
  text-shadow:0 0 20px rgba(240,201,122,0.22);position:relative;z-index:1;
}
.char{display:inline;opacity:0;animation:cin .001s forwards;}
@keyframes cin{to{opacity:1;}}

/* INSTRUCTION */
.instr{
  text-align:center;font-size:.62rem;letter-spacing:1px;
  color:rgba(255,180,200,0.4);margin:0 16px 10px;line-height:1.6;
}

/* PLAY BUTTON */
.lyric-controls{
  display:flex;align-items:center;justify-content:center;gap:12px;margin:0 16px 8px;
}
.play-btn{
  flex:1;
  background:linear-gradient(135deg,var(--tulip),#a01830);
  border:none;border-radius:10px;cursor:pointer;
  color:#fff;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:11px 10px;
  box-shadow:0 0 18px rgba(232,64,90,0.45);
  animation:pglow 2s infinite;
  font-family:'Raleway',sans-serif;font-weight:400;
  transition:transform .15s;
}
.play-btn:active{transform:scale(.96);}
.play-btn.playing{background:linear-gradient(135deg,#a01830,var(--tulip));}
@keyframes pglow{
  0%,100%{box-shadow:0 0 18px rgba(232,64,90,0.45);}
  50%{box-shadow:0 0 32px rgba(232,64,90,0.7);}
}

/* VISUAL PROGRESS */
.prog-wrap{margin:2px 16px 6px;}
.prog-track{height:2.5px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;cursor:pointer;}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--tulip),var(--gold));
  border-radius:99px;box-shadow:0 0 7px rgba(232,64,90,0.5);
  transition:width .3s linear;pointer-events:none;
}
.time-row{display:flex;justify-content:space-between;font-size:.58rem;color:rgba(255,255,255,.2);margin-top:4px;letter-spacing:.5px;}

/* SIGNATURE */
.sig{text-align:center;margin:8px 0 4px;padding:0 16px;}
.sig-name{
  font-family:'Pinyon Script',cursive;font-size:1.75rem;
  color:rgba(240,201,122,0.8);text-shadow:0 0 20px rgba(240,201,122,0.3);line-height:1;
}
.sig-line{font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.18);margin-top:3px;}

/* HEART BURST */
.hburst{position:fixed;pointer-events:none;z-index:999;font-size:1.3rem;animation:bup 1.5s ease-out forwards;}
@keyframes bup{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-80px) scale(.15) rotate(30deg);}}
</style>

const audio  = document.getElementById('audio');
const playBtn= document.getElementById('playBtn');
const pFill  = document.getElementById('pFill');
const pTrack = document.getElementById('pTrack');
const tCur   = document.getElementById('tCur');
const tDur   = document.getElementById('tDur');
const lHindi = document.getElementById('lHindi');
const lEng   = document.getElementById('lEng');

let lyricIdx = 0;

const fmt = s => {
  if(isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
};

function writeLine(el, text, mpc=42){
  el.innerHTML='';
  [...text].forEach((ch,i)=>{
    const sp=document.createElement('span');
    sp.className='char';
    sp.textContent=ch===' '?'\u00A0':ch;
    sp.style.animationDelay=(i*mpc)+'ms';
    el.appendChild(sp);
  });
}

function showLyric(idx, anim=true){
  if(idx<0||idx>=LYRICS.length) return;
  lyricIdx=idx;
  const l=LYRICS[idx];
  lHindi.style.opacity='0';
  setTimeout(()=>{lHindi.textContent=l.h; lHindi.style.opacity='1';},180);
  anim ? writeLine(lEng,l.e,42) : (lEng.textContent=l.e);
}

function updateLyrics(currentTime){
  let ni=0;
  for(let i=0;i<LYRICS.length;i++){
    if(currentTime>=LYRICS[i].t) ni=i;
    else break;
  }
  if(ni!==lyricIdx) showLyric(ni);
}

function updateProgress(currentTime){
  const duration = audio.duration;
  if(!duration || isNaN(duration)) return;
  const pct = (currentTime/duration)*100;
  pFill.style.width = pct+'%';
  tCur.textContent  = fmt(currentTime);
}

audio.addEventListener('timeupdate', ()=>{
  const current = audio.currentTime;
  updateLyrics(current);
  updateProgress(current);
});

audio.addEventListener('loadedmetadata', ()=>{
  tDur.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', ()=>{
  playBtn.textContent='▶ Play';
  playBtn.classList.remove('playing');
});

playBtn.addEventListener('click', ()=>{
  if(audio.paused){
    audio.play().catch(()=>{});
    playBtn.textContent='⏸ Pause';
    playBtn.classList.add('playing');
    spawnHearts(playBtn);
  } else {
    audio.pause();
    playBtn.textContent='▶ Resume';
    playBtn.classList.remove('playing');
  }
});

// Seek on progress bar click
pTrack.addEventListener('click', e=>{
  const duration = audio.duration;
  if(!duration || isNaN(duration)) return;
  const r = pTrack.getBoundingClientRect();
  const ratio = (e.clientX - r.left) / r.width;
  audio.currentTime = ratio * duration;
});

function spawnHearts(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const em=['💕','❤️','🌷','💖','✨','🌸'];
  for(let i=0;i<9;i++){
    setTimeout(()=>{
      const h=document.createElement('div');
      h.className='hburst';
      h.textContent=em[Math.floor(Math.random()*em.length)];
      h.style.cssText=`left:${cx+(Math.random()-.5)*80-10}px;top:${cy-18}px;animation-delay:${Math.random()*.25}s`;
      document.body.appendChild(h);
      h.addEventListener('animationend',()=>h.remove());
    },i*65);
  }
}

// floating petals
const pc=document.getElementById('petals-container');
const pe=['🌷','🌷','🌷','🌸','🌺','❤️','🌷'];
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='fpetal';
  p.textContent=pe[i%pe.length];
  p.style.left=(Math.random()*100)+'vw';
  p.style.fontSize=(.5+Math.random()*.75)+'rem';
  p.style.animationDuration=(7+Math.random()*10)+'s';
  p.style.animationDelay=(Math.random()*14)+'s';
  pc.appendChild(p);
}

showLyric(0, false);
</script>
